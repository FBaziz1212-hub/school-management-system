<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Search Student Certificate</title>

<style>

body{
    font-family:Arial;
    background:#f4f6f9;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#1a3c6e;
    margin-bottom:20px;
}

#searchInput{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:1px solid #ccc;
    border-radius:5px;
    font-size:15px;
    box-sizing:border-box;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#1a5dc7;
    color:white;
    padding:12px;
}

table td{
    padding:10px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

tr:hover{
    background:#f2f2f2;
}

.btn{
    background:#28a745;
    color:white;
    padding:8px 14px;
    text-decoration:none;
    border-radius:5px;
}

.btn:hover{
    background:#218838;
}

</style>
</head>

<body>

<div class="container">

<h1>School Leaving Certificate</h1>

<input
type="text"
id="searchInput"
placeholder="Search Student..."
onkeyup="searchTable()"
>

<table id="studentTable">

<tr>
    <th>GR No</th>
    <th>Name</th>
    <th>Father</th>
    <th>Class</th>
    <th>Action</th>
</tr>

{% for s in students %}

<tr>

    <td>{{ s.gr_number }}</td>

    <td>{{ s.name }}</td>

    <td>{{ s.father }}</td>

    <td>{{ s.student_class }}</td>

    <td>

        <a href="/generate_leaving_certificate/{{ s.id }}"
        class="btn">

        Generate Certificate

        </a>

    </td>

</tr>

{% endfor %}

</table>

</div>

<script>

function searchTable(){

    let input =
    document.getElementById("searchInput")
    .value
    .toLowerCase();

    let rows =
    document.querySelectorAll("#studentTable tr");

    rows.forEach((row, index) => {

        if(index === 0) return;

        let text =
        row.innerText.toLowerCase();

        row.style.display =
        text.includes(input)
        ? ""
        : "none";

    });

}

</script>

</body>
</html>
