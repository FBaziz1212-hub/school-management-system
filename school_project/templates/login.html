<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#16a34a);
    overflow:hidden;
}

.background-circles{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:1;
}

.circle{
    position:absolute;
    border-radius:50%;
    background:rgba(255,255,255,0.08);
}

.circle1{
    width:250px;
    height:250px;
    top:-60px;
    left:-60px;
}

.circle2{
    width:350px;
    height:350px;
    bottom:-100px;
    right:-80px;
}

.circle3{
    width:180px;
    height:180px;
    top:50%;
    left:8%;
}

.login-container{
    width:950px;
    min-height:550px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:25px;
    overflow:hidden;
    display:flex;
    position:relative;
    z-index:2;
    box-shadow:0 20px 60px rgba(0,0,0,0.3);
}

.left-side{
    flex:1;
    background:rgba(255,255,255,0.08);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px;
    color:white;
    text-align:center;
}

.logo{
    width:140px;
    height:140px;
    object-fit:contain;
    margin-bottom:25px;
    background: aliceblue ;
    border-radius:50%;
    padding:10px;
}

.school-name{
    font-size:34px;
    font-weight:700;
    line-height:1.3;
    margin-bottom:15px;
}

.school-text{
    font-size:16px;
    opacity:0.9;
    line-height:1.7;
    max-width:350px;
}

.right-side{
    flex:1;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:50px;
}

.login-box{
    width:100%;
    max-width:360px;
}

.login-box h1{
    color:#123d7a;
    font-size:36px;
    margin-bottom:10px;
}

.login-box p{
    color:#666;
    margin-bottom:35px;
}

.input-group{
    margin-bottom:22px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#123d7a;
    font-weight:600;
}

.input-group input{
    width:100%;
    padding:14px 18px;
    border:2px solid #dbe4f0;
    border-radius:12px;
    font-size:15px;
    transition:0.3s;
    outline:none;
}

.input-group input:focus{
    border-color:#1e3a8a;
    box-shadow:0 0 10px rgba(30,58,138,0.15);
}

.login-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#1e3a8a,#16a34a);
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(22,163,74,0.3);
}

.password-box{
    position:relative;
}

.password-box input{
    padding-right:45px;
}

#togglePassword{
    position:absolute;
    right:15px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#555;
}

.footer-text{
    margin-top:25px;
    text-align:center;
    color:#777;
    font-size:14px;
}

@media(max-width:900px){

    .login-container{
        flex-direction:column;
        width:95%;
        margin:20px;
    }

    .left-side{
        padding:30px 20px;
    }

    .school-name{
        font-size:28px;
    }

    .right-side{
        padding:35px 25px;
    }

}

</style>
</head>

<body>

<div class="background-circles">
    <div class="circle circle1"></div>
    <div class="circle circle2"></div>
    <div class="circle circle3"></div>
</div>

<div class="login-container">

    <!-- LEFT SIDE -->

    <div class="left-side">

        <img
        src="{{ url_for('static', filename='logo.png') }}"
        class="logo">

        <div class="school-name">
            HIRA BAIT-UL-HAMD <br>
            HIGH SCHOOL SUKKUR
        </div>

        <div class="school-text">
            Welcome to the School Management System.
            Manage admissions, certificates, student records,
            and printing easily with a professional dashboard.
        </div>

    </div>


    <!-- RIGHT SIDE -->

    <div class="right-side">

        <div class="login-box">

            <h1>Login</h1>

            <p>
                Enter your username and password to continue.
            </p>

            <form method="POST">

                <div class="input-group">
                    <label>Username</label>

                    <input
                    type="text"
                    name="username"
                    placeholder="Enter Username"
                    required>
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <div class="password-box">

                    <input
                    type="password"
                    name="password"
                    id="password"
                    placeholder="Enter Password"
                    required>

                    <i
                     class="fa-solid fa-eye"
                     id="togglePassword">

                    </i>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    Login To Dashboard
                </button>

            </form>

            <div class="footer-text">
                School Management System
            </div>

        </div>

    </div>

</div>

<script>

const togglePassword =
document.getElementById('togglePassword');

const password =
document.getElementById('password');

togglePassword.addEventListener('click', function(){

    if(password.type === 'password'){

        password.type = 'text';

        this.classList.remove('fa-eye');

        this.classList.add('fa-eye-slash');

    }

    else{

        password.type = 'password';

        this.classList.remove('fa-eye-slash');

        this.classList.add('fa-eye');

    }

});

</script>

</body>
</html>
```
