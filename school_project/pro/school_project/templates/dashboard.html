<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">

<style>

/* Fix layout */
* {
    box-sizing: border-box;
}

/* Background image */
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: url("/static/school.jpg") no-repeat center center/cover;
}

/* Dark overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.4);
    top: 0;
    left: 0;
}

/* Main box */
.container {
    position: relative;
    z-index: 1;
    background: white;
    padding: 40px;
    border-radius: 12px;
    width: 400px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

h1 {
    color: #2c3e50;
}

p {
    color: #555;
    margin-bottom: 25px;
}

/* Buttons */
.btn {
    display: block;
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    text-decoration: none;
    color: white;
    border-radius: 6px;
    background: #3498db;
    transition: 0.3s;
}

.btn:hover {
    background: #2980b9;
}

.logout {
    background: #e74c3c;
}

.logout:hover {
    background: #c0392b;
}

</style>
</head>

<body>

<div class="container">
    <h1>Welcome Admin 👩‍💻</h1>
    <p>Smart School Management System</p>

    <a href="/admission" class="btn">➕ New Admission</a>
    <a href="/certificate" class="btn">📄 Leaving Certificate</a>
    <a href="/view_admissions" class="btn">📋 View Admissions List</a>

    <a href="/logout" class="btn logout">Logout</a>
</div>

</body>
</html>
