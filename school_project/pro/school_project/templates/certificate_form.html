<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>School Leaving Certificate</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f2f4f7;
    padding:5px;
}

.container{
    max-width:1200px;
    margin:auto;
    margin-top: 0;
    background:white;
    padding:10px;
    border:2px solid #000;
}

/* HEADER */

.header{
    display:flex;
    align-items:center;
    gap:20px;
    border-bottom:2px solid #000;
    padding-bottom:8px;
    margin-bottom:12px;
}

.logo{
    width:150px;
}

.header-content{
    flex:1;
    text-align:center;
}

.header h1{
    color:#123d7a;
    font-size:35px;
    font-family:'Times New Roman', serif;
    font-weight: bold;
}

.green-title{
    background:#28a745; !important;
    color:white; !important;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
    display:inline-block;
    padding:10px 180px;
    border-radius:5px;
    margin-top:8px;
    font-size:24px;
    letter-spacing:1px;
    font-family:'segoe';
    font-weight: bold;
}

/* FIELDS */

.field{
    margin-top:6px;
    line-height:34px;
    font-family:'Times New Roman', serif;
    font-size:22px;
}

.field label{
    font-weight:bold;
    font-family:'Times New Roman', serif;
    font-size:20px;
}

.inline-input{
    border:none;
    border-bottom:1px solid black;
    outline:none;
    background:transparent;
    font-family:'Times New Roman', serif;
    font-size:22px;
    padding:2px 5px;
}

.readonly{
    color:#000;
}

.small{
    width:180px;
}

.medium{
    width:320px;
}

.large{
    width:500px;
}

.remarks{
    width:100%;
    border:none;
    border-bottom:1px solid black;
    outline:none;
    background:transparent;
    font-family:'Times New Roman', serif;
    font-size:22px;
    margin-top:3px;
}

/* CERTIFIED */

.certified{
    margin-top:3px;
    text-align:center;
    font-family:'Times New Roman', serif;
    font-size:22px;
    font-weight:bold;
}

/* SIGNATURES */

.signatures{
    display:flex;
    justify-content:space-between;
    margin-top:15px;
}

.sign-box{
    width:220px;
    text-align:center;
    font-family:'Times New Roman', serif;
    font-size:18px;
}

.sign-line{
    border-top:1px solid black;
    margin-bottom:10px;
}

/* BUTTONS */

.btns{
    display:flex;
    gap:20px;
    margin-top:20px;
}

button,
a{
    flex:1;
    padding:14px;
    border:none;
    border-radius:5px;
    text-align:center;
    text-decoration:none;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.print-btn{
    background:#1a5dc7;
}

.dashboard-btn{
    background:#28a745;
}

.print-btn:hover{
    background:#154aa3;
}

.dashboard-btn:hover{
    background:#218838;
}

/* PRINT */

@page{
    size:A4 landscape;
    margin:0;
}

@media print{

    .btns{
        display:none;
    }

    body{
        background:white;
        padding:0;
    }

    .container{
        border:none;
        margin-top: 0;
    }

}

</style>
</head>

<body>

<div class="container">

<!-- HEADER -->

<div class="header">

<img
src="{{ url_for('static', filename='logo.png') }}"
class="logo">

<div class="header-content">

<h1>
HIRA BAIT-UL-HAMD HIGH SCHOOL SUKKUR
</h1>

<div class="green-title">
SCHOOL LEAVING CERTIFICATE
</div>

</div>

</div>

<form method="POST">

<!-- TOP LINE -->

<div class="field">

<label>GR No :</label>

<input
type="text"
value="{{ s.gr_number }}"
readonly
class="inline-input small readonly">

&nbsp;&nbsp;&nbsp;&nbsp;

<label>Certificate No :</label>

<input type="text" class="inline-input small">

</div>

<!-- STUDENT NAME -->

<div class="field">

<label>Student Name :</label>

<input
type="text"
value="{{ s.name }}"
readonly
class="inline-input large readonly">

</div>

<!-- FATHER -->

<div class="field">

<label>Father Name :</label>

<input
type="text"
value="{{ s.father }}"
readonly
class="inline-input large readonly">

</div>

<!-- CASTE -->

<div class="field">

<label>Race / Caste :</label>

<input
type="text"
value="{{ s.surname }}"
readonly
class="inline-input medium readonly">

&nbsp;&nbsp;&nbsp;

<label>Nationality :</label>

<input
type="text"
value="{{ s.nationality }}"
readonly
class="inline-input medium readonly">

</div>

<!-- BIRTH -->

<div class="field">

<label>Place Of Birth :</label>

<input
type="text"
value="{{ s.place_of_birth }}"
readonly
class="inline-input medium readonly">

&nbsp;&nbsp;&nbsp;

<label>Date Of Birth (Figures) :</label>

<input
type="text"
value="{{ s.dob.split('-')[2] }}-{{ s.dob.split('-')[1] }}-{{ s.dob.split('-')[0] }}"
readonly
class="inline-input medium readonly">

</div>

<!-- DOB WORDS -->

<div class="field">

<label>Date Of Birth (In Words) :</label>

<input
type="text"
value="Twelfth December Two Thousand Two"
readonly
class="inline-input large readonly">

</div>

<!-- ADMISSION -->

<div class="field">

<label>Date Of Admission :</label>

<input
type="text"
value="{{ s.admission_date.split('-')[2] }}-{{ s.admission_date.split('-')[1] }}-{{ s.admission_date.split('-')[0] }}"
readonly
class="inline-input medium readonly">

&nbsp;&nbsp;&nbsp;

<label>Admitted In Class :</label>

<input
type="text"
value="{{ s.student_class }}"
readonly
class="inline-input small readonly">

</div>

<!-- LAST SCHOOL -->

<div class="field">

<label>Last School Attended :</label>

<input
type="text"
value="{{ s.last_school }}"
readonly
class="inline-input large readonly">

</div>

<!-- PROGRESS -->

<div class="field">

<label>Progress :</label>

<input type="text" class="inline-input small">

&nbsp;&nbsp;&nbsp;

<label>Conduct :</label>

<input type="text" class="inline-input small">

&nbsp;&nbsp;&nbsp;

<label>Attendance :</label>

<input type="text" class="inline-input small">

</div>

<!-- LEAVING -->

<div class="field">

<label>Date Of Leaving School :</label>

<input type="date" class="inline-input medium">

</div>

<!-- STUDIED -->

<div class="field">

<label>Class In Which Studied And Since When :</label>

<input type="text" class="inline-input large">

</div>

<!-- REASON -->

<div class="field">

<label>Reason Of Leaving School :</label>

<input type="text" class="inline-input large">

</div>

<!-- REMARKS -->

<div class="field">

<label>Remarks :</label>

<input type="text" class="remarks">

</div>

<!-- CERTIFIED -->

<div class="certified">

Certified that all above information is in accordance with the school record.

</div>

<!-- SIGNATURES -->

<div class="signatures">

<div class="sign-box">

<div class="sign-line"></div>

Vice Principal

</div>

<div class="sign-box">

<div class="sign-line"></div>

Principal

</div>

</div>

<!-- BUTTONS -->

<div class="btns">

<button
type="button"
onclick="window.print()"
class="print-btn">

Print Certificate

</button>

<a
href="/dashboard"
class="dashboard-btn">

Back To Dashboard

</a>

</div>

</form>

</div>

</body>
</html>
